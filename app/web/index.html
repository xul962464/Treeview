<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhyloTree Viewer</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        padding: 8px 12px;
        border-bottom: 1px solid #e5e7eb;
        background: #fafafa;
        font-size: 13px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      #sourcePath {
        color: #374151;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }
      #status {
        color: #6b7280;
      }
      #canvas {
        flex: 1;
        overflow: auto;
        padding: 12px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        background: #0b1020;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 12px;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div id="sourcePath">未加载文件</div>
        <div id="status">等待打开</div>
      </div>
      <div id="canvas">
        <pre id="raw">在菜单“文件->打开树文件”选择 .nwk/.nex/.tre 文件。</pre>
      </div>
    </div>
    <script src="./viewer.js"></script>
  </body>
</html>
